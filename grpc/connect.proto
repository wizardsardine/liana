syntax = "proto3";

package connect.v1;

option go_package = "coincube/grpc/gen/connectv1;connectv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_PENDING = 1;
  SESSION_STATUS_DELIVERED = 2;
  SESSION_STATUS_VIEWED = 3;
  SESSION_STATUS_APPROVED = 4;
  SESSION_STATUS_PARTIALLY_SIGNED = 5;
  SESSION_STATUS_COMPLETED = 6;
  SESSION_STATUS_REJECTED = 7;
  SESSION_STATUS_CANCELLED = 8;
  SESSION_STATUS_EXPIRED = 9;
  SESSION_STATUS_FAILED = 10;
}

enum DevicePlatform {
  DEVICE_PLATFORM_UNSPECIFIED = 0;
  DEVICE_PLATFORM_IOS = 1;
  DEVICE_PLATFORM_ANDROID = 2;
  DEVICE_PLATFORM_DESKTOP = 3;
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_SESSION_CREATED = 1;
  EVENT_TYPE_SESSION_DELIVERED = 2;
  EVENT_TYPE_SESSION_VIEWED = 3;
  EVENT_TYPE_SESSION_APPROVED = 4;
  EVENT_TYPE_SESSION_REJECTED = 5;
  EVENT_TYPE_SIGNATURE_SUBMITTED = 6;
  EVENT_TYPE_SESSION_COMPLETED = 7;
  EVENT_TYPE_SESSION_CANCELLED = 8;
  EVENT_TYPE_SESSION_EXPIRED = 9;
  EVENT_TYPE_ERROR = 10;
  EVENT_TYPE_DEVICE_ONLINE = 11;
  EVENT_TYPE_DEVICE_OFFLINE = 12;
}

message SignerTarget {
  string device_id = 1;
  string key_fingerprint = 2;
  string key_id = 3;
}

message SigningPolicySummary {
  uint32 required_signatures = 1;
  repeated string allowed_key_ids = 2;
  bool requires_biometric = 3;
  bool requires_local_pin = 4;
  bool timelock_path = 5;
  string policy_label = 6;
}

message TxOutputSummary {
  string address = 1;
  uint64 amount_sats = 2;
  bool is_change = 3;
  string label = 4;
}

message TxSummary {
  uint64 total_input_sats = 1;
  uint64 total_output_sats = 2;
  uint64 fee_sats = 3;
  repeated TxOutputSummary outputs = 4;
  string network = 5;
}

message SubmittedSignature {
  string device_id = 1;
  bytes signed_psbt = 2;
  repeated string signed_key_ids = 3;
  google.protobuf.Timestamp created_at = 4;
}

message SigningSession {
  string session_id = 1;
  string request_id = 2;
  string user_id = 3;
  string vault_id = 4;
  string descriptor_id = 5;
  bytes psbt = 6;
  TxSummary tx_summary = 7;
  SigningPolicySummary policy_summary = 8;
  repeated SignerTarget targets = 9;
  SessionStatus status = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp expires_at = 12;
  string created_by_device_id = 13;
  string note = 14;
  repeated SubmittedSignature submitted_signatures = 15;
  // is_recovery_spend records that this session spends the vault's recovery
  // branch (inheritance recovery). Server-recorded at creation after the
  // recovery gate passes; lets clients render recovery sessions distinctly.
  bool is_recovery_spend = 16;
}

message CreateSigningSessionRequest {
  string request_id = 1;
  string vault_id = 2;
  string descriptor_id = 3;
  bytes psbt = 4;
  repeated SignerTarget targets = 5;
  string note = 6;
  google.protobuf.Duration ttl = 7;
  bool require_user_presence = 8;
  // is_recovery_spend declares that this PSBT spends the vault's recovery
  // branch. The server cannot infer the spent branch from the PSBT, so the
  // client must declare it; the server then gates creation on the recovery
  // path being open (keyholder caller + monitoring state available/reminding +
  // owner not under duress). Ignored (false) for ordinary owner-branch spends.
  bool is_recovery_spend = 9;
}

message CreateSigningSessionResponse {
  SigningSession session = 1;
}

message GetSigningSessionRequest {
  string session_id = 1;
}

message GetSigningSessionResponse {
  SigningSession session = 1;
}

message CancelSigningSessionRequest {
  string session_id = 1;
  string reason = 2;
}

message CancelSigningSessionResponse {}

message ApproveSessionRequest {
  string session_id = 1;
  string approval_token = 2;
}

message ApproveSessionResponse {}

message RejectSessionRequest {
  string session_id = 1;
  string reason = 2;
}

message RejectSessionResponse {}

message MarkDeliveredRequest {
  string session_id = 1;
}

message MarkDeliveredResponse {}

message MarkViewedRequest {
  string session_id = 1;
}

message MarkViewedResponse {}

message SubmitPartialSignatureRequest {
  string session_id = 1;
  bytes signed_psbt = 2;
  repeated string signed_key_ids = 3;
}

message SubmitPartialSignatureResponse {
  SessionStatus status = 1;
}

message RegisterDeviceRequest {
  string device_name = 1;
  DevicePlatform platform = 2;
  string push_token = 3;
  string app_version = 4;
  string os_version = 5;
  string device_pubkey = 6;
  repeated string capabilities = 7;
}

message RegisterDeviceResponse {
  string device_id = 1;
}

message UpdatePushTokenRequest {
  string device_id = 1;
  string push_token = 2;
}

message UpdatePushTokenResponse {}

message StreamEnvelope {
  oneof body {
    ClientHello client_hello = 1;
    ClientAck client_ack = 2;
    SessionEvent session_event = 3;
    ErrorEvent error = 4;
    Ping ping = 5;
    Pong pong = 6;
    DuressActivatedEvent duress_activated = 7;
    DuressClearedEvent duress_cleared = 8;
  }
}

// DuressActivatedEvent is broadcast on the existing Connect stream when an
// account enters duress, so every connected desktop / Keychain client can
// react in realtime. Offline clients reconcile via GET /connect/duress.
// (Synced from coincube-api/grpc/connect.proto for Phase 7b.)
message DuressActivatedEvent {
  string account_id = 1;
  google.protobuf.Timestamp duress_unlock_at = 2;
  // "desktop_pin" | "auth_trigger" | "email_link" | "duress_crk_password"
  string source = 3;
}

message DuressClearedEvent {
  string account_id = 1;
  google.protobuf.Timestamp cleared_at = 2;
}

message ClientHello {
  string device_id = 1;
  DevicePlatform platform = 2;
  string user_agent = 3;
  repeated string subscribe_vault_ids = 4;
  int64 last_seen_event_seq = 5;
}

message ClientAck {
  int64 event_seq = 1;
}

message SessionEvent {
  int64 event_seq = 1;
  EventType event_type = 2;
  string session_id = 3;
  SessionStatus status = 4;
  SigningSession session = 5;
  string message = 6;
  google.protobuf.Timestamp created_at = 7;
  string device_id = 8;
}

message ListPendingSessionsRequest {}

message ListPendingSessionsResponse {
  repeated SigningSession sessions = 1;
}

message ResolveSignersRequest {
  string vault_id = 1;
}

message ResolveSignersResponse {
  repeated SignerTarget targets = 1;
  repeated UnresolvedSigner unresolved = 2;
}

message UnresolvedSigner {
  string key_id = 1;
  string key_fingerprint = 2;
  string owner_user_id = 3;
  // Machine-readable reason: "no_device_registered" | "all_devices_revoked" | "owner_unknown".
  string reason = 4;
}

message ErrorEvent {
  string code = 1;
  string message = 2;
  string session_id = 3;
}

message Ping {
  int64 ts_unix_ms = 1;
}

message Pong {
  int64 ts_unix_ms = 1;
}

// Inheritance heir-escrow ECIES decrypt (COIN-377, rev 3). The heir's
// Keychain holds the recovery private key; on recovery it derives the
// dedicated encryption child, performs the secp256k1 ECDH against the
// envelope's ephemeral pubkey, HKDFs the shared secret, and returns only the
// derived symmetric key. The desktop completes the AES-256-GCM open and the
// restore locally, so the seed/descriptor plaintext never leaves the heir's
// machine and Keychain never sees it. Requires biometric/PIN approval and is
// refused while the heir's own account is under duress. The API relays the
// request to the heir's Keychain and returns its response; it never reads the
// shared key. See keychain-app/plans/PLAN-inheritance-recovery.md.
message DecryptInheritanceEnvelopeRequest {
  // The cube being recovered — selects which recovery key/account the heir's
  // Keychain derives from.
  string cube_id = 1;
  // Compressed 33-byte secp256k1 ephemeral public key from the ECIES envelope.
  bytes ephemeral_pubkey = 2;
  // Non-hardened child path (relative to the heir's registered xpub) of the
  // dedicated encryption key (invariant I5). Keychain derives this child
  // private key, ECDHs against ephemeral_pubkey, then HKDFs → shared_key.
  string derivation = 3;
  // Scheme tag; must equal "ecies-secp256k1-hkdf-aes256gcm-v1" so Keychain can
  // refuse a scheme it does not implement.
  string purpose = 4;
}

message DecryptInheritanceEnvelopeResponse {
  // 32-byte HKDF-derived symmetric key K. Keychain NEVER returns the recovery
  // private key or the seed/descriptor plaintext — the desktop opens the
  // AES-256-GCM ciphertext with this key.
  bytes shared_key = 1;
}

service SessionService {
  rpc CreateSigningSession(CreateSigningSessionRequest) returns (CreateSigningSessionResponse);
  rpc GetSigningSession(GetSigningSessionRequest) returns (GetSigningSessionResponse);
  rpc ListPendingSessions(ListPendingSessionsRequest) returns (ListPendingSessionsResponse);
  rpc CancelSigningSession(CancelSigningSessionRequest) returns (CancelSigningSessionResponse);
  rpc MarkDelivered(MarkDeliveredRequest) returns (MarkDeliveredResponse);
  rpc MarkViewed(MarkViewedRequest) returns (MarkViewedResponse);
  rpc ApproveSession(ApproveSessionRequest) returns (ApproveSessionResponse);
  rpc RejectSession(RejectSessionRequest) returns (RejectSessionResponse);
  rpc SubmitPartialSignature(SubmitPartialSignatureRequest) returns (SubmitPartialSignatureResponse);
  rpc ResolveSigners(ResolveSignersRequest) returns (ResolveSignersResponse);
  // Heir-escrow ECIES decrypt — relayed to the heir's Keychain, which approves
  // (biometric/PIN) and returns the HKDF-derived key. Never returns plaintext.
  rpc DecryptInheritanceEnvelope(DecryptInheritanceEnvelopeRequest) returns (DecryptInheritanceEnvelopeResponse);
}

service DeviceService {
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);
  rpc UpdatePushToken(UpdatePushTokenRequest) returns (UpdatePushTokenResponse);
}

service RealtimeService {
  rpc Connect(stream StreamEnvelope) returns (stream StreamEnvelope);
}
