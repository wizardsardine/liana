name: Coverage

on:
  pull_request:
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "contrib/coverage.sh"
      - ".github/workflows/coverage.yml"
  workflow_dispatch:

jobs:
  rust-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BREEZ_API_KEY: DUMMY_BREEZ_API_KEY
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          components: llvm-tools-preview

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libfontconfig1-dev pkg-config libdbus-1-dev protobuf-compiler libwebkit2gtk-4.1-dev

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: ./contrib/coverage.sh

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            target/coverage/lcov.info
            target/coverage/summary.json
