name: Coincube Release Workflow

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*"
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_RELEASE_LTO: true
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
  BREEZ_API_KEY: ${{ github.event_name == 'push' && secrets.BREEZ_API_KEY || 'DUMMY_BREEZ_API_KEY' }}
  COINCUBE_API_URL: ${{ vars.COINCUBE_API_URL }}
  EVENTS_API_URL: ${{ vars.EVENTS_API_URL }}

jobs:
  release:
    name: Build & Release
    if: github.repository == 'coincubetech/coincube'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos
            arch: arm64

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install common tooling
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-wix,apple-codesign,jaq

      - name: Set Coincube version from Cargo
        shell: bash
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jaq -r '.packages[] | select(.name=="coincube-gui") | .version')
          echo "COINCUBE_VERSION=$version" >> $GITHUB_ENV

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-
          path: target

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          makeLatest: true
          name: Coincube v${{ env.COINCUBE_VERSION }}
          allowUpdates: true

# --------------------------------------------------
# Linux
# --------------------------------------------------

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config protobuf-compiler libdbus-1-dev

      - name: Upload Linux binary
        if: matrix.platform == 'linux'
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          package: coincube-gui
          bin: coincube
          archive: coincube-${{ matrix.target }}
          target: ${{ matrix.target }}
          include: LICENCE,README.md
          profile: minimal
          locked: true

# --------------------------------------------------
# Windows
# --------------------------------------------------

      - name: Install Windows dependencies
        if: matrix.platform == 'windows'
        run: choco install protoc --yes

      - name: Build Windows MSI
        if: matrix.platform == 'windows'
        run: cargo wix --package coincube-gui --profile minimal --output "target\wix\coincube-x86_64-pc-windows-msvc.msi" --include ./contrib/release/wix/main.wxs --nocapture -v

      - name: Upload Windows MSI
        if: matrix.platform == 'windows'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/wix/coincube-x86_64-pc-windows-msvc.msi
          tag: ${{ github.ref }}
          overwrite: true

# --------------------------------------------------
# macOS (arm64 + x64)
# --------------------------------------------------

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: brew install protobuf create-dmg

      - name: Prepare Apple Developer ID certificate
        if: matrix.platform == 'macos'
        env:
          P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          echo "$P12_PASSWORD" > cert.pass

      - name: Build Coincube (macOS ${{ matrix.arch }})
        if: matrix.platform == 'macos'
        env:
          PROTOC: /opt/homebrew/bin/protoc
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --package coincube-gui --profile minimal --target ${{ matrix.target }}
          ls -R target

      - name: Generate Icons for Installers
        if: matrix.platform == 'macos'
        run: |
          python3 -m venv .venv
          .venv/bin/pip install pillow icnsutil
          mkdir -p contrib/icons
          .venv/bin/python contrib/release/macos/icns-creator.py

      - name: Assemble .app bundle
        if: matrix.platform == 'macos'
        run: |
          unzip contrib/release/macos/_coincube.zip
          sed -i '' "s/VERSION_PLACEHOLDER/${{ env.COINCUBE_VERSION }}/g" Coincube.app/Contents/Info.plist
          mv target/${{ matrix.target }}/minimal/coincube Coincube.app/Contents/MacOS/Coincube
          mv contrib/release/macos/Coincube.icns Coincube.app/Contents/Resources/Coincube.icns

      - name: Sign macOS app
        if: matrix.platform == 'macos'
        run: rcodesign sign --for-notarization --p12-file cert.p12 --p12-password-file cert.pass Coincube.app

      - name: Notarize and staple app
        if: matrix.platform == 'macos'
        run: |
          ls -R Coincube.app
          base64 -D <<< "${{ secrets.APPSTORECONNECT_KEY_JSON }}" > key.json
          rcodesign notary-submit --api-key-path key.json --max-wait-seconds 1800 --staple Coincube.app
          spctl --assess --type execute --verbose Coincube.app

      - name: Create DMG
        if: matrix.platform == 'macos'
        run: |
          create-dmg \
            --volname "Coincube" \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Coincube.app" 175 120 \
            --app-drop-link 425 120 \
            "Coincube-${{ env.COINCUBE_VERSION }}-${{ matrix.arch }}.dmg" \
            Coincube.app

      - name: Upload macOS DMG
        if: matrix.platform == 'macos'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: Coincube-${{ env.COINCUBE_VERSION }}-${{ matrix.arch }}.dmg
          tag: ${{ github.ref }}
          overwrite: true

      - name: Cleanup secrets
        if: matrix.platform == 'macos' && always()
        run: |
          rm -f cert.p12 cert.pass key.json

  checksums:
    name: Generate & Sign Checksums
    needs: release
    runs-on: ubuntu-latest
    if: github.repository == 'coincubetech/coincube'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set Coincube version from Cargo
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="coincube-gui") | .version')
          echo "COINCUBE_VERSION=$version" >> $GITHUB_ENV

      - name: Download release artifacts
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.ref_name }}
          fileName: "*"
          out-file-path: "artifacts"

      - name: Generate checksums file
        run: |
          cd artifacts
          # Exclude checksum and signature files from being checksummed
          find . -type f ! -name '*SHA256SUMS*' ! -name '*.asc' ! -name '*.sig' -exec sha256sum {} \; | sed 's|\./||' > ../coincube-${{ env.COINCUBE_VERSION }}-SHA256SUMS.txt
          cd ..
          cat coincube-${{ env.COINCUBE_VERSION }}-SHA256SUMS.txt

      - name: Import GPG signing key
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Sign checksums file
        run: |
          gpg --batch --yes \
            --pinentry-mode loopback \
            --passphrase "${GPG_PASSPHRASE}" \
            --detach-sign --armor \
            coincube-${{ env.COINCUBE_VERSION }}-SHA256SUMS.txt
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload checksums and signature
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: coincube-${{ env.COINCUBE_VERSION }}-SHA256SUMS.txt*
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true