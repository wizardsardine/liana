version: "3.8"

services:
  sonarqube:
    image: sonarqube:26.3.0.120487-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - ${HOME}/sonarqube/plugins:/opt/sonarqube/extensions/plugins



volumes:
  sonarqube_data:



